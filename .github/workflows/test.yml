name: Test

on:
  push:
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
  pull_request:
    paths:
      - '**/*.go'
      - go.mod
      - go.sum

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go tests
        run: go test ./...
